capture:
  # Diagnostic only: request the maximum auto-exposure range supported by the
  # active camera profile. The 800 us value below is only the formal baseline
  # whose removal must be verified; it is not applied in this mode.
  diagnostic_unrestricted_auto_exposure: true
  color_auto_exposure: true
  color_exposure_us: null
  color_ae_max_exposure_us: null
  diagnostic_replaced_auto_cap_us: 800

stitch:
  # Reusing this file with g305-panorama automatically produces diagnostic
  # artifacts. It may bypass input appearance, formal odometry thresholds and
  # final image-quality gates, but never the strict RGB-D session contract,
  # finite SE(3), connected graph, projection or memory-safety requirements.
  diagnostic_force: true
  input_quality_gate: false
  scan_seam:
    quality_gate: false
