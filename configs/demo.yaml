capture:
  width: 1280
  height: 800
  fps: 30
  color_formats: [RGB, BGR, YUYV, MJPG]
  align: software
  frame_sync: true
  # PRIMARY mode emits one external synchronization pulse per RGB-D frame.
  # With the default 30 fps profiles, the synchronization port outputs 30 Hz.
  external_sync_output: true
  warmup_frames: 30
  warmup_timeout_seconds: 15
  frame_timeout_seconds: 5
  queue_size: 64
  # Default: capped automatic exposure. For a fixed manual duration, set
  # color_auto_exposure: false and color_exposure_us to a positive microsecond value.
  color_auto_exposure: true
  color_exposure_us: null
  color_ae_max_exposure_us: 800
  # Explicitly unsafe-for-delivery opt-in. Prefer the CLI flag for one-off diagnostics.
  diagnostic_unrestricted_auto_exposure: false
  color_gain: null
  # Let capped AE/AWB settle during warm-up.  The formal continuous capture
  # then reads back and locks exposure, sensor gain and white balance before
  # any delivered scan frame is accepted.
  color_auto_white_balance: true
  color_white_balance: null
  lock_color_controls_after_warmup: true
  # Discard transition frames and require two consecutive metadata-verified
  # frames after the exposure/gain/AWB lock has been read back.
  post_lock_verified_frames: 2
  require_locked_control_metadata: true
  color_anti_flicker: true
  jpeg_quality: 95
  depth_png_compression: 1
  save_raw_depth: false

  # No-preview, one-trigger-per-frame RGB-D photo sequence used by
  # g305-capture --photo-mode. It runs without artificial throttling and
  # selects the highest common color/depth FPS at the configured resolution.
  photo_mode:
    enabled: true
    fastest_common_fps: true
    exposure_us: 800
    trigger_out_delay_us: 17000
    capture_timeout_ms: 8000
    # Gemini firmware may consume early gate-off triggers while warming the
    # RGB-D pipeline. All attempts remain physically gated, and the gate stays
    # off for a full late-response window after the final priming trigger.
    prime_attempts: 8
    prime_timeout_ms: 1500
    gate_settle_ms: 250

stitch:
  # Open3D measures every short RGB-D edge; ORB-SLAM3 RGB-D uses the complete
  # short-baseline sequence to stabilise the global camera trajectory.
  pose_backend: hybrid_orbslam3_rgbd
  # Published pixels remain samples from calibrated RGB.  Aligned depth is
  # additionally allowed in a narrow adjacent-seam analysis to classify true
  # visibility and, only after a held-out mesh audit, adjust RGB sampling
  # coordinates. It never supplies colour, a global projection, or a pose.
  adaptive_layout: true
  analysis_width: 320
  layout_target_displacement_fraction: 0.18
  layout_max_displacement_fraction: 0.28
  layout_max_frames: 160
  # Keep every real frame in a normal-length scan as a pose node. This makes
  # both odometry and rendering short-baseline at close range; it never
  # interpolates a pose between captures.
  dense_rgbd_pose_chain: true
  # Wide selected-node edges are refined from an initial pose composed solely
  # from reliable consecutive RGB-D measurements. This is automatic and does
  # not create interpolated poses or feature-only constraints.
  short_baseline_initialization: true
  orbslam3_rgbd:
    enabled: true
    # Paths are resolved inside WSL.  Override root in a site-specific config
    # when ORB-SLAM3 is installed elsewhere.
    root: ~/Projects/ORB_SLAM3_WS/ORB_SLAM3
    executable: Examples/RGB-D/rgbd_tum
    vocabulary: Vocabulary/ORBvoc.txt
    timeout_seconds: 600.0
    # The renderer never interpolates an untracked frame, so every dense pose
    # node used by the scan must have a genuine ORB-SLAM3 pose.
    minimum_tracked_fraction: 1.0
    feature_count: 1800
    fast_threshold: 12
    minimum_fast_threshold: 5
  max_canvas_megapixels: 200
  sequence_blend_mode: calibrated_rgb_pushbroom
  # A coloured TSDF mesh is a required A/B/C 3-D inspection artifact.  It is
  # built only after the RGB-only panorama decision and never contributes
  # pixels, geometry, seams, crop, or quality decisions to panorama.jpg.
  tsdf_visualization:
    enabled: true
    voxel_length_mm: 5.0
    sdf_truncation_mm: 20.0
    maximum_depth_mm: 10000.0
  input_quality_gate: true
  # Diagnostic profiles may set this to true; formal defaults must remain false.
  diagnostic_force: false
  # Structural RGB-D failures still cannot publish.  For a structurally valid
  # scan, this policy makes any future audited hard-cut fallback explicit:
  # publish the degraded result, keep local APAP/flow disabled by default, and
  # require manual review for grade C.
  handoff_fallback_policy:
    publish_degraded: true
    local_apap_flow_enabled: false
    manual_review_for_grade_c: true
  # This experimental renderer is reachable only through
  # g305-central-strip-diagnostic's injected callback.  It is never a formal
  # g305-panorama backend or failure fallback, and its first release exposes no
  # user-tunable algorithm parameters.
  central_strip_diagnostic:
    enabled: false
    reference_scale_mode: robust_aligned_depth_plane
    orientation_mode: verified_camera_to_world
    maximum_central_band_fraction: 0.20
    minimum_pair_overlap_pixels: 96
    exposure_mode: global_gain
    multiband_levels: 5
  color_exposure_unit_us: 100
  maximum_motion_exposure_us: 1200

  rgbd_odometry:
    working_width: 640
    require_aligned_depth: true
    require_calibration: true
    minimum_depth_mm: 150.0
    maximum_depth_mm: 10000.0
    maximum_depth_difference_mm: 70.0
    evaluation_distance_mm: 50.0
    minimum_valid_depth_ratio: 0.10
    minimum_fitness: 0.15
    maximum_inlier_rmse_mm: 50.0
    maximum_pair_translation_mm: 750.0
    maximum_pair_vertical_mm: 80.0
    maximum_pair_forward_mm: 120.0
    maximum_pair_rotation_deg: 6.0
    iteration_number_per_pyramid_level: [20, 10, 5]

  pose_graph:
    enabled: true
    # A side scan is an open chain, not a loop. Unseeded long-range odometry
    # constraints can pull an otherwise correct close-range chain into a wrong
    # global solution; verified loop constraints may be enabled by a dedicated
    # global tracker later.
    nonadjacent_max_gap: 0
    maximum_correspondence_distance_mm: 50.0
    edge_prune_threshold: 0.25
    preference_loop_closure: 0.10

  pose_quality:
    minimum_scan_span_mm: 20.0
    maximum_reverse_step_mm: 5.0
    maximum_reverse_fraction: 0.02
    maximum_step_translation_mm: 750.0
    maximum_step_vertical_mm: 80.0
    maximum_step_forward_mm: 120.0
    maximum_total_vertical_drift_mm: 120.0
    maximum_total_forward_drift_mm: 150.0
    maximum_step_rotation_deg: 6.0
    maximum_total_rotation_deg: 10.0
    maximum_edge_translation_residual_mm: 30.0
    maximum_edge_rotation_residual_deg: 2.0
    maximum_consecutive_unreliable_edges: 2
    require_all_adjacent_edges: true

  calibrated_rgb_pushbroom:
    mode: calibrated_rgb_pushbroom
    # Every real optimized pose node is a source.  The renderer keeps only a
    # local strip window resident and never stores per-source full canvases.
    maximum_central_band_fraction: 0.20
    # Intermediate frames stay within the central-band limit.  The first and
    # final frame each own their calibrated outward half-FOV so endpoint scenes
    # remain present in the published panorama.
    endpoint_outer_half_fov: true
    # This is a read-only GraphCut search corridor, not a blend width.  The
    # owner contribution remains bounded by the central-strip policy, while
    # the eventual safe MultiBand band remains 2-8 pixels.
    seam_search_width_pixels: 64
    max_canvas_megapixels: 200
    max_aggregate_megapixels: 200
    max_pose_count: 160
    max_resident_frames: 5
    # The layout scale is estimated from adjacent RGB motion divided by the
    # corresponding verified SE(3) camera-centre displacement.  It is not a
    # 2-D trajectory or a depth/plane proxy.
    minimum_valid_scale_pairs: 3
    scale_central_fraction: 0.20
    # Safe-wall gain estimation uses only the low-gradient portion of the
    # adjacent RGB overlap; it never averages foreground/label details.
    scale_low_gradient_quantile: 0.45
    scale_minimum_response: 0.10
    scale_max_relative_mad: 0.35
    # RGB-only residual analysis runs from low-resolution calibrated previews.
    # It selects identity until a later audited model is proven on held-out
    # evidence; previews never provide output pixels or replace real SE(3).
    residual_alignment:
      backend: se3_epipolar_hierarchical_rgb
      analysis_width: 640
      # Analysis has an independent hard cap: only adjacent previews are kept
      # and the aggregate dense evidence cannot exceed this RGB-only budget.
      maximum_preview_megapixels: 2.0
      maximum_evidence_megapixels: 3.0
      held_out_fraction: 0.20
      owner_track_consistency: true
      # The verified RGB-D camera_to_world SE(3) chain is the sole global
      # geometry.  RGB preview evidence remains analysis-only here.
      background_model: identity
      maximum_residual_displacement_pixels: 8.0
      maximum_background_roll_degrees: 0.25
      maximum_flow_fb_error_pixels: 1.0
      maximum_epipolar_error_pixels: 1.0
      # Rigid-normal fitting remains a separately invoked diagnostic phase;
      # formal owner decisions are whole RGB components only.
      component_model: owner_only
      maximum_edge_step_p95_pixels: 1.5
      maximum_edge_step_pixels: 3.0
      cut_mesh_formal_enabled: false
    # Only a topology-qualified raw structural RGB seed (or a strong boundary
    # residual/full-height hard-cut) may inspect a 96--160 px adjacent RGB-D
    # corridor. Lab-only exposure/colour risk still hard-owns RGB but cannot
    # request geometry. Only one mutually visible same-wall/background layer
    # can drive this 16/32 px inverse mesh; depth edges, holes, occlusions and
    # strong RGB optical structures are hard-owned and never enter MultiBand.
    geometry_assisted_seam:
      enabled: true
      analysis_corridor_width_pixels: 128
      trigger_edge_offset_p95_pixels: 1.0
      absolute_depth_tolerance_mm: 20.0
      relative_depth_tolerance: 0.02
      depth_noise_mm: 0.0
      mutual_reprojection_tolerance_pixels: 0.40
      edge_guard_radius_pixels: 8
      minimum_trigger_boundary_observable_pixels: 32
      flow_validation_preview_scale: 0.75
      minimum_held_out_flow_validation_pixels: 8
      minimum_held_out_strong_edge_validation_pixels: 8
      maximum_held_out_flow_fb_error_pixels: 0.75
      mesh_cell_pixels: 16
      minimum_mutual_correspondences: 30
      minimum_active_mesh_cells: 4
      maximum_local_displacement_pixels: 8.0
      maximum_straight_line_deviation_pixels: 1.0
      # Every observed baseline RGB doorframe/skirting line must remain
      # straight after raw mesh forward-inversion.  If no solver-valid line
      # survives protected samples, record not_observed and rely on the
      # always-required intrinsic mesh centreline/edge/diagonal audit.
      minimum_actual_rgb_line_length_pixels: 24.0
      minimum_actual_rgb_line_support_fraction: 0.80
      maximum_actual_rgb_line_segments: 32
      actual_rgb_line_inverse_maximum_iterations: 8
      actual_rgb_line_inverse_maximum_residual_pixels: 0.05
      maximum_held_out_error_pixels: 0.75
      maximum_held_out_maximum_error_pixels: 2.0
      minimum_held_out_improvement_pixels: 0.05
      minimum_held_out_improvement_ratio: 0.30

  scan_seam:
    backend: rgb_monotonic_hard_owner_graphcut
    # Only safe, low-gradient RGB overlap may be blended.  The per-pair radius
    # is clamp(floor(0.20 * narrower_owner_width), 2, 8), never a global blur.
    multiband_levels: 3
    exposure_mode: safe_wall_global_linear_rgb
    quality_gate: true
